<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Colección de Música</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 m-0 min-h-screen flex flex-col">
    
    <header class="bg-[#AEC6CF] text-slate-800 py-6 text-center shadow-md">
        <h1 class="text-3xl font-semibold m-0">Mi Inventario Musical</h1>
    </header>
    
    <main class="w-full max-w-4xl mx-auto my-8 bg-white p-8 rounded-lg shadow-sm flex-grow">
        {% block micontenido %}{% endblock %}
    </main>
    
    <footer class="text-center py-6 text-slate-500 text-sm mt-auto">
        <p>Proyecto desarrollado con Python, Flask, MongoDB y Tailwind CSS 🚀</p>
    </footer>

</body>
</html>
